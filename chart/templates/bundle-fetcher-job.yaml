# ============================================================================
# ☢️  DEMO-ONLY PROMPT BUNDLE — committed fixture, NOT a verified signed bundle.
# In the real platform this PVC is populated by cosign-verifying and pulling the
# signed lib-agent-prompt OCI bundle (supply-chain integrity is the whole point).
# Here we ship lib-agent-prompt's example bundle as a committed fixture and seed
# the PVC from it, because the signed OCI bundle is not published. Same
# friction-vs-correctness, demo-only trade-off as chart/demo-ca and
# chart/demo-secrets — see chart/demo-bundle/README.md. NEVER ship like this.
# The seed Job is best-effort (always exits 0) so a bundle/consumer-shape
# mismatch surfaces as a localized pod failure, not a wedged pre-install hook.
#
# All three objects live in the `gateway` namespace (NOT platform): the sole
# consumer is agent-gateway, which runs in `gateway`, and a pod can only mount
# a PVC from its own namespace. (`gateway` is created out-of-band by
# bootstrap.sh before Helm runs the pre-install hooks.)
# ============================================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prompt-bundle
  namespace: gateway
  annotations:
    # Must be a pre-install/pre-upgrade hook ordered *before* the fixture
    # ConfigMap (-10) and the seed Job (-5): the Job mounts this PVC, and
    # Helm runs hooks before normal manifests, so a non-hook PVC would not
    # exist yet and the hook Job would hang until pre-install times out.
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-20"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 200Mi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prompt-bundle-fixture
  namespace: gateway
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation
binaryData:
  bundle.tgz: {{ .Files.Get "demo-bundle/bundle.tgz" | b64enc }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: bundle-fetcher
  namespace: gateway
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 1
  template:
    metadata:
      annotations:
        linkerd.io/inject: disabled
    spec:
      restartPolicy: Never
      containers:
        - name: seed-bundle
          image: alpine:3.20
          command: ["/bin/sh", "-c"]
          args:
            - |
              # Best-effort: never fail the install. If the fixture is missing
              # or its shape doesn't match a consumer, that consumer fails on
              # its own (localized + diagnosable) rather than wedging here.
              set +e
              mkdir -p /bundle
              if [ -f /fixture/bundle.tgz ]; then
                tar -xzf /fixture/bundle.tgz -C /bundle && \
                  echo "seeded prompt-bundle PVC from committed demo fixture:" && \
                  ls -laR /bundle | head -40
              else
                echo "WARN: /fixture/bundle.tgz missing; leaving PVC empty"
              fi
              exit 0
          volumeMounts:
            - { name: fixture, mountPath: /fixture }
            - { name: bundle,  mountPath: /bundle  }
      volumes:
        - name: fixture
          configMap:
            name: prompt-bundle-fixture
        - name: bundle
          persistentVolumeClaim:
            claimName: prompt-bundle
