apiVersion: v1
kind: ConfigMap
metadata:
  name: customer-db-seed-sql
  namespace: platform
data:
  seed.sql: |
    -- Idempotent: only seeds if customers table is empty.
    CREATE TABLE IF NOT EXISTS customers (
      id            SERIAL PRIMARY KEY,
      name          TEXT NOT NULL,
      email         TEXT NOT NULL,
      region        TEXT NOT NULL,
      created_at    TIMESTAMP NOT NULL DEFAULT NOW()
    );
    CREATE TABLE IF NOT EXISTS orders (
      id            SERIAL PRIMARY KEY,
      customer_id   INTEGER NOT NULL REFERENCES customers(id),
      total_cents   INTEGER NOT NULL,
      status        TEXT NOT NULL,
      created_at    TIMESTAMP NOT NULL DEFAULT NOW()
    );
    CREATE TABLE IF NOT EXISTS audit_events (
      id            SERIAL PRIMARY KEY,
      actor         TEXT NOT NULL,
      action        TEXT NOT NULL,
      target        TEXT NOT NULL,
      ts            TIMESTAMP NOT NULL DEFAULT NOW()
    );
    CREATE TABLE IF NOT EXISTS transactions (
      id            SERIAL PRIMARY KEY,
      customer_id   INTEGER NOT NULL REFERENCES customers(id),
      amount_cents  INTEGER NOT NULL,
      kind          TEXT NOT NULL,
      ts            TIMESTAMP NOT NULL DEFAULT NOW()
    );

    INSERT INTO customers (name, email, region)
      SELECT * FROM (VALUES
        ('Acme Robotics',      'ops@acme.example',      'north-america'),
        ('Bluefin Logistics',  'admin@bluefin.example', 'europe'),
        ('Cobalt Industries',  'it@cobalt.example',     'asia-pacific'),
        ('Delphi Analytics',   'ops@delphi.example',    'north-america'),
        ('Echo Manufacturing', 'admin@echo.example',    'europe'),
        ('Foxglove Studios',   'admin@foxglove.example','north-america'),
        ('Gigafab Plc',        'ops@gigafab.example',   'europe'),
        ('Atlantis Marine',    'sec@atlantis.example',  'atlantis'),
        ('Poseidon Diving',    'ops@poseidon.example',  'atlantis'),
        ('Triton Charters',    'admin@triton.example',  'atlantis')
      ) AS new(name,email,region)
      WHERE NOT EXISTS (SELECT 1 FROM customers);

    INSERT INTO orders (customer_id, total_cents, status)
      SELECT (random()*9 + 1)::int, (random()*100000)::int, 'fulfilled'
      FROM generate_series(1, 20)
      WHERE NOT EXISTS (SELECT 1 FROM orders);

    INSERT INTO transactions (customer_id, amount_cents, kind)
      SELECT (random()*9 + 1)::int, (random()*50000)::int, 'payment'
      FROM generate_series(1, 15)
      WHERE NOT EXISTS (SELECT 1 FROM transactions);

    INSERT INTO audit_events (actor, action, target)
      VALUES
        ('alice@example.com', 'login',  'system'),
        ('bob@example.com',   'login',  'system'),
        ('carol@example.com', 'login',  'system')
      ON CONFLICT DO NOTHING;
