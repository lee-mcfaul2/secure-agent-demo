# values-demo.yaml ‚Äî defaults for the local walkthrough demo.
# All platform components enabled. Local Ollama LLM. Traffic generator runs.

# Toggles for each subchart (matches the conditions in Chart.yaml).
# Linkerd + SPIRE CRDs are shipped in chart/crds/ (Helm installs them before
# templates) ‚Äî they are not subcharts, so there are no crds toggles here.
# ============================================================================
# ‚ò¢Ô∏è  DEMO-ONLY LINKERD CA ‚Äî committed private keys, on purpose. ‚ò¢Ô∏è
# The trust anchor + issuer below come from chart/demo-ca/ (see its README).
# Committing a mesh CA private key is a severe anti-pattern; it exists ONLY to
# make `make demo` a single command on a throwaway local KIND cluster. Never
# reuse this anywhere real. In production, Linkerd's issuer is rotated by
# cert-manager and the trust anchor lives offline in an HSM/KMS.
# ============================================================================
