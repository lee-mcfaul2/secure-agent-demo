# values-demo.yaml — defaults for the local walkthrough demo.
# All platform components enabled. Local Ollama LLM. Traffic generator runs.

# Toggles for each subchart (matches the conditions in Chart.yaml).
# Linkerd + SPIRE CRDs are shipped in chart/crds/ (Helm installs them before
# templates) — they are not subcharts, so there are no crds toggles here.
# Linkerd control plane is NOT here: it is a SEPARATE Helm release in its own
# `linkerd` namespace (see scripts/bootstrap.sh + chart/linkerd-values.yaml).
spire:
  enabled: true
  # The OIDC discovery provider is the only component that mounts the
  # csi.spiffe.io volume; it races the CSI DaemonSet registration and the
  # demo does not use external OIDC federation (mesh identity is Linkerd;
  # user auth is dex). Disable it to remove the flaky CSI consumer.
  spiffe-oidc-discovery-provider:
    enabled: false

traffic-gen:
  enabled: true
  namespace: platform
  intervalSeconds: 10

# Subchart namespaces — used by Helm at install time when --create-namespace
# isn't sufficient (e.g., dex via its own values).
# (Helm subchart namespace pinning isn't supported uniformly; we rely on
# `helm install -n platform` for the umbrella + the namespace template above.)

customer-db:
  enabled: true
  # Service must be `customer-db-postgresql` (bitnami default would be
  # ai-security-customer-db) so the DSN host every consumer uses —
  # customer-db-postgresql.platform.svc.cluster.local — resolves.
  fullnameOverride: customer-db-postgresql
  # ☢️ Bitnami deleted versioned community tags from docker.io/bitnami/* in
  # 2025; the unchanged images live under docker.io/bitnamilegacy/*. Pin the
  # legacy mirror so a turnkey demo still pulls. (Production: use a supported
  # registry / your own mirror.)
  image:
    registry: docker.io
    repository: bitnamilegacy/postgresql
    tag: 17.6.0-debian-12-r4
  auth:
    username: customers
    password: customers-demo-pw
    database: customers
  primary:
    persistence:
      enabled: true
      size: 1Gi
    service:
      type: ClusterIP

dex:
  enabled: true
  # Service name must be `dex` (default would be <release>-dex = ai-security-dex)
  # so the hardcoded http://dex.platform.svc.cluster.local:5556/dex issuer/JWKS
  # URLs in the gateway/mcp configs resolve.
  fullnameOverride: dex
  ingress:
    enabled: false
  service:
    type: NodePort
    ports:
      http:
        port: 5556
        nodePort: 30556
  config:
    issuer: http://dex.platform.svc.cluster.local:5556/dex
    storage:
      type: memory
    web:
      http: 0.0.0.0:5556
    enablePasswordDB: true
    oauth2:
      passwordConnector: local
    staticClients:
      - id: demo-ui
        name: Demo UI
        secret: demo-secret
        redirectURIs:
          - "http://localhost:8080/callback"
    staticPasswords:
      - email: "alice@example.com"
        hash: "$2a$10$2b2cu2GVqJ4dW0L0gZpW/.NDw3SeAFlmPnHsGCfsKsXezSpAfknNi"
        username: alice
        userID: "00000000-0000-0000-0000-000000000001"
      - email: "bob@example.com"
        hash: "$2a$10$2b2cu2GVqJ4dW0L0gZpW/.NDw3SeAFlmPnHsGCfsKsXezSpAfknNi"
        username: bob
        userID: "00000000-0000-0000-0000-000000000002"
      - email: "carol@example.com"
        hash: "$2a$10$2b2cu2GVqJ4dW0L0gZpW/.NDw3SeAFlmPnHsGCfsKsXezSpAfknNi"
        username: carol
        userID: "00000000-0000-0000-0000-000000000003"
    # Demo user permissions are surfaced via the `groups` claim. The
    # agent-gateway and agent-sql-mcp consume these as permission scopes.
    # alice → full access. bob → no transactions, no atlantis. carol → KB only.
    # (Dex doesn't natively support per-user claims; we use the password connector's
    # group memberships via a static-groups extension at the OPA layer. The
    # gateway maps groups→permissions via its existing perms.yaml.)

pii-tokenizer:
  enabled: true
  # chart reads `replicas` (not replicaCount) — contract map §4
  replicas: 1
  # chart reads `namespace` (not namespaceOverride) — contract map §4
  namespace: platform
  # Container listen addr is hardcoded :8443; Service targetPort + Linkerd
  # Server are also 8443. Keep Service 8443 (contract map §4 CONFLICT decision:
  # do NOT use the old demo 8080). Gateway tokenizer.url must also be :8443.
  service:
    port: 8443
  kmaster:
    backend: aead-local
    aeadLocal:
      secretName: pii-tokenizer-kmaster
    # ========================================================================
    # ☢️  DEMO-ONLY TOKENIZER MASTER KEY — committed in plaintext, on purpose. ☢️
    # This AES master key (chart/demo-secrets/k_master.txt, see its README) is
    # baked in so `make demo` is genuinely turnkey — zero manual setup. Committing
    # a tokenizer master key is a severe anti-pattern: anyone with this repo can
    # decrypt every PII token it ever produces. It is acceptable ONLY because this
    # is a throwaway local-KIND demo with no real data behind it. In production
    # this comes from a KMS/HSM via go-kms-wrapping and is never in source.
    # Override for anything real by passing -f chart/values-secrets.yaml.
    # ========================================================================
    demoKey: "PUXt6hTOiQQftmsJFgOtbWXz+vLCQ3NsRf+9qDwUQVY="
  # chart reads `redis.mode`/`redis.addrs`. A Redis Service must exist at this
  # addr (provisioned elsewhere — see contract map §4 redis note).
  redis:
    mode: single
    addrs: "redis.platform.svc.cluster.local:6379"
  # Shared 4-core node: minimal CPU request (scheduling-only); limit unchanged.
  resources:
    requests: { cpu: "25m",  memory: "256Mi" }
    limits:   { cpu: "1",    memory: "512Mi" }

llm-guard:
  enabled: true
  # chart reads `replicaCount` (key matches) — contract map §3
  replicaCount: 1
  # chart reads `namespace` (not namespaceOverride) — contract map §3
  namespace: platform
  # Service port 8000 to match demo docs (Step A / contract map §3 CONFLICT
  # decision). Chart Service: port 8000 -> targetPort http(container 8080).
  service:
    port: 8000
  # Gateway is the only caller; chart drives its NetworkPolicy + MeshTLS off
  # linkerd.gateway.{namespace,serviceAccount} (the old demo
  # networkPolicy.allowedNamespaces / scanners.* / piiTypes.configMapName keys
  # are NOT read by the chart — contract map §3).
  linkerd:
    gateway:
      namespace: gateway
      serviceAccount: agent-gateway-sa
  prometheus:
    serviceMonitor:
      enabled: true
  # Shared 4-core node: minimal CPU request (scheduling-only); limit unchanged.
  resources:
    requests: { cpu: "50m",  memory: "1Gi" }
    limits:   { cpu: "2",    memory: "4Gi" }

agent-gateway:
  enabled: true
  # chart reads `replicas` (not replicaCount) — contract map §1.
  # 1 replica: shared 4-core node, no HA needed for the demo.
  replicas: 1
  # chart reads `namespace` (not namespaceOverride) — contract map §1
  namespace: gateway
  sandboxNamespace: sandbox
  # Chart Service has no type/nodePort fields (always ClusterIP) and hardcodes
  # targetPort 8000. Service port = .Values.service.port → set 8080 so
  # `port-forward svc/agent-gateway 8080:8080` (walkthrough) works. Contract
  # map §1: Service port 8080, targetPort 8000.
  service:
    port: 8080
  oidc:
    issuer: http://dex.platform.svc.cluster.local:5556/dex
    # dex staticClient id is `demo-ui` (chart default `ag-gateway` is wrong) —
    # contract map §1
    audience: demo-ui
  # chart key is tokenizer.url (not tokenizer.baseUrl); pii-tokenizer Service
  # is 8443 end-to-end — contract map §1/§4
  tokenizer:
    url: http://pii-tokenizer.platform.svc.cluster.local:8443
  # chart key path is llm_guard.* (not llmGuard.*); base_url must match the
  # llm-guard Service port 8000 (Step A / contract map §1+§3)
  llm_guard:
    enabled: true
    base_url: http://llm-guard.platform.svc.cluster.local:8000
  # ☢️ DEMO-ONLY: mount a pre-seeded prompt-bundle PVC instead of pulling a
  # signed OCI bundle. demoMode wires the volume + drops the cosign secret.
  # (Old demo keys bundle.pvcName/pvcNamespace/mountPath were not read.)
  bundle:
    demoMode: true
    demoPvcName: prompt-bundle
    demoPvcNamespace: gateway
    demoMountPath: /var/lib/prompts
  # ☢️ DEMO-ONLY: chart creates the audit DB Secret from this DSN so the
  # gateway's unconditional secretKeyRef resolves without an external Secret.
  audit:
    demoDsn: postgres://customers:customers-demo-pw@customer-db-postgresql.platform.svc.cluster.local:5432/customers?sslmode=disable
  # Empty secret names omit the external-provider API-key env entirely (ollama
  # demo mode never uses them) — contract map §1
  llmProviders:
    anthropicSecretName: ""
    openaiSecretName: ""
  # mode=ollama renders the litellm ConfigMap; the single alias
  # `claude-sonnet-4-6` (gateway default_model) maps to the local Llama.
  litellm:
    mode: ollama
    model_list:
      - model_name: "claude-sonnet-4-6"
        litellm_params:
          model: "ollama_chat/llama3.2:3b"
          api_base: "http://local-llm.platform.svc.cluster.local:11434"
  # The published gateway image's pydantic-settings JSON-decodes the
  # `allowed_models` tuple field from its env var, so the value MUST be a JSON
  # array string (CSV raised SettingsError). Only claude-sonnet-4-6 is a
  # routable litellm model_name, so that's the sole allowed model.
  models:
    default_model: "claude-sonnet-4-6"
    allowed_models: '["claude-sonnet-4-6"]'
  # Shared 4-core node: minimal CPU request (scheduling-only); limit unchanged.
  resources:
    requests: { cpu: "50m",  memory: "512Mi" }
    limits:   { cpu: "2",    memory: "1Gi" }

agent-sandbox:
  enabled: true
  # The sandbox chart ships a Pod-template ConfigMap (NOT a Deployment) the
  # gateway's Job launcher consumes. Only flat chart keys below are read; the
  # old podTemplate.* block (namespaceOverride/litellmUrl/mcps/nested resources)
  # was entirely unread — contract map §2. LITELLM_URL + MCP URLs are injected
  # by the gateway at Job-creation time, not configured here.
  # chart reads `namespace` (not namespaceOverride)
  namespace: sandbox
  linkerd:
    gateway:
      namespace: gateway
      serviceAccount: agent-gateway-sa
  # chart wants flat resources.{cpu,memory,ephemeralStorage} (not
  # requests/limits) — contract map §2
  # Per-sandbox-Job request on a shared 4-core node: keep small so an on-demand
  # sandbox can actually schedule (cpu is the Job's request, not a limit).
  resources:
    cpu: "100m"
    memory: "1Gi"
    ephemeralStorage: "64Mi"
  # pod-template hardcodes runtimeClassName: gvisor; install the RuntimeClass
  # so the demo can schedule (contract map §2 tie-break: walkthrough must
  # reproduce → gvisor.install: true).
  gvisor:
    install: true

# Values match the patched agent-sql-mcp chart contract (charts-local/).
# The chart now assembles its own DSN Secret from these plain values, so no
# pre-existing cross-namespace secret ref is needed.
agent-sql-mcp:
  enabled: true
  replicas: 1
  namespace: mcp
  service:
    port: 8443
  database:
    host: customer-db-postgresql.platform.svc.cluster.local
    port: 5432
    user: customers
    name: customers
    # Matches customer-db.auth.password above. ☢️ DEMO-ONLY plaintext —
    # consistent with the platform's other loudly-flagged baked secrets.
    password: customers-demo-pw
    sslmode: disable
  oidc:
    issuer: http://dex.platform.svc.cluster.local:5556/dex
    audience: demo-ui
  # Shared 4-core node: minimal CPU request (scheduling-only); limit unchanged.
  resources:
    requests: { cpu: "25m",  memory: "256Mi" }
    limits:   { cpu: "1",    memory: "512Mi" }

kube-prometheus-stack:
  enabled: true
  fullnameOverride: kps
  namespaceOverride: platform
  prometheus:
    prometheusSpec:
      retention: 7d
      retentionSize: 5GiB
      # Pick up ServiceMonitors from ANY namespace (subcharts label theirs).
      serviceMonitorSelectorNilUsesHelmValues: false
      podMonitorSelectorNilUsesHelmValues: false
      ruleSelectorNilUsesHelmValues: false
    service:
      type: ClusterIP
  grafana:
    enabled: true
    adminPassword: "prom-operator"
    service:
      type: NodePort
      nodePort: 30090
    sidecar:
      dashboards:
        enabled: true
        label: grafana_dashboard
        labelValue: "1"
        searchNamespace: ALL
      datasources:
        enabled: true
    grafana.ini:
      auth.anonymous:
        enabled: true
        org_role: Viewer
    persistence:
      enabled: true
      size: 1Gi
  alertmanager:
    # Not needed for the demo (no alert consumers); a StatefulSet+PVC+probes
    # is pure load on the shared 4-core node and flaps helm --wait.
    enabled: false

local-llm:
  enabled: true
  namespace: platform
  model: "llama3.2:3b"

demo-ui:
  enabled: true
  namespace: platform

