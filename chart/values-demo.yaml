spire:                  { enabled: true }

traffic-gen:
  enabled: true
  namespace: platform
  intervalSeconds: 10

# Subchart namespaces — used by Helm at install time when --create-namespace
# isn't sufficient (e.g., dex via its own values).
# (Helm subchart namespace pinning isn't supported uniformly; we rely on
# `helm install -n platform` for the umbrella + the namespace template above.)

customer-db:
  enabled: true
  auth:
    username: customers
    password: customers-demo-pw
    database: customers
  primary:
    persistence:
      enabled: true
      size: 1Gi
    service:
      type: ClusterIP

dex:
  enabled: true
  ingress:
    enabled: false
  service:
    type: NodePort
    ports:
      http:
        port: 5556
        nodePort: 30556
  config:
    issuer: http://dex.platform.svc.cluster.local:5556/dex
    storage:
      type: memory
    web:
      http: 0.0.0.0:5556
    enablePasswordDB: true
    oauth2:
      passwordConnector: local
    staticClients:
      - id: demo-ui
        name: Demo UI
        secret: demo-secret
        redirectURIs:
          - "http://localhost:8080/callback"
    staticPasswords:
      - email: "alice@example.com"
        hash: "$2a$10$2b2cu2GVqJ4dW0L0gZpW/.NDw3SeAFlmPnHsGCfsKsXezSpAfknNi"
        username: alice
        userID: "00000000-0000-0000-0000-000000000001"
      - email: "bob@example.com"
        hash: "$2a$10$2b2cu2GVqJ4dW0L0gZpW/.NDw3SeAFlmPnHsGCfsKsXezSpAfknNi"
        username: bob
        userID: "00000000-0000-0000-0000-000000000002"
      - email: "carol@example.com"
        hash: "$2a$10$2b2cu2GVqJ4dW0L0gZpW/.NDw3SeAFlmPnHsGCfsKsXezSpAfknNi"
        username: carol
        userID: "00000000-0000-0000-0000-000000000003"
    # Demo user permissions are surfaced via the `groups` claim. The
    # agent-gateway and agent-sql-mcp consume these as permission scopes.
    # alice → full access. bob → no transactions, no atlantis. carol → KB only.
    # (Dex doesn't natively support per-user claims; we use the password connector's
    # group memberships via a static-groups extension at the OPA layer. The
    # gateway maps groups→permissions via its existing perms.yaml.)

pii-tokenizer:
  enabled: true
  replicaCount: 1
  namespaceOverride: platform
  service:
    port: 8080
  # ==========================================================================
  # ☢️  DEMO-ONLY TOKENIZER MASTER KEY — committed in plaintext, on purpose. ☢️
  # This AES master key (chart/demo-secrets/k_master.txt, see its README) is
  # baked in so `make demo` is genuinely turnkey — zero manual setup. Committing
  # a tokenizer master key is a severe anti-pattern: anyone with this repo can
  # decrypt every PII token it ever produces. It is acceptable ONLY because this
  # is a throwaway local-KIND demo with no real data behind it. In production
  # this comes from a KMS/HSM via go-kms-wrapping and is never in source.
  # Override for anything real by passing -f chart/values-secrets.yaml.
  # ==========================================================================
  k_master: "PUXt6hTOiQQftmsJFgOtbWXz+vLCQ3NsRf+9qDwUQVY="
  redis:
    enabled: true
    persistence: { enabled: true, size: 500Mi }
  networkPolicy:
    # Only gateway can call us.
    allowedNamespaces:
      - gateway
  serviceMonitor:
    enabled: true
    namespace: platform
  resources:
    requests: { cpu: "100m", memory: "256Mi" }
    limits:   { cpu: "1",    memory: "512Mi" }

llm-guard:
  enabled: true
  replicaCount: 1
  namespaceOverride: platform
  service:
    port: 8000
  piiTypes:
    # Mount the platform-level pii-types ConfigMap (defined in T7).
    configMapName: pii-types
    mountPath: /etc/llm-guard
  scanners:
    promptInjection: { enabled: true,  threshold: 0.8 }
    toxicity:        { enabled: true,  threshold: 0.7 }
    secrets:         { enabled: true }
  failClosed: true  # per workspace memory ai_security_fail_closed_default
  networkPolicy:
    allowedNamespaces:
      - gateway
  serviceMonitor:
    enabled: true
    namespace: platform
  resources:
    requests: { cpu: "500m", memory: "1Gi" }
    limits:   { cpu: "2",    memory: "4Gi" }

agent-gateway:
  enabled: true
  replicaCount: 2
  namespaceOverride: gateway
  service:
    type: NodePort
    port: 8080
    nodePort: 30080  # matches kind/demo-cluster.yaml extraPortMappings → host:8080
  bundle:
    pvcName: prompt-bundle      # mounted from platform.svc
    pvcNamespace: platform
    mountPath: /var/lib/prompts
  llmGuard:
    enabled: true
    baseUrl: http://llm-guard.platform.svc.cluster.local:8000
  tokenizer:
    baseUrl: http://pii-tokenizer.platform.svc.cluster.local:8080
  oidc:
    issuer: http://dex.platform.svc.cluster.local:5556/dex
    audience: demo-ui
    jwksRefreshSeconds: 60
  litellm:
    mode: ollama
    model_list:
      - model_name: "claude-sonnet-4-6"   # gateway's default_model; sandbox sees only this name
        litellm_params:
          model: "ollama_chat/llama3.2:3b"
          api_base: "http://local-llm.platform.svc.cluster.local:11434"
      - model_name: "llama3.2"
        litellm_params:
          model: "ollama_chat/llama3.2:3b"
          api_base: "http://local-llm.platform.svc.cluster.local:11434"
  models:
    allowed_models:
      - claude-sonnet-4-6
      - llama3.2
    default_model: claude-sonnet-4-6
  serviceMonitor:
    enabled: true
    namespace: gateway
  resources:
    requests: { cpu: "200m", memory: "512Mi" }
    limits:   { cpu: "2",    memory: "1Gi" }

agent-sandbox:
  enabled: true
  # The sandbox chart ships a Pod template (NOT a Deployment) that the gateway's
  # Job launcher uses. We provide the template's contents via values here.
  podTemplate:
    namespaceOverride: sandbox
    bundlePvcName: prompt-bundle
    bundlePvcNamespace: platform
    litellmUrl: http://agent-gateway.gateway.svc.cluster.local:8080/litellm
    mcps:
      sql:
        baseUrl: http://agent-sql-mcp.mcp.svc.cluster.local:8081
    resources:
      requests: { cpu: "100m", memory: "256Mi" }
      limits:   { cpu: "1",    memory: "1Gi" }

agent-sql-mcp:
  enabled: true
  replicaCount: 1
  namespaceOverride: mcp
  service:
    port: 8081
  database:
    host: customer-db-postgresql.platform.svc.cluster.local
    port: 5432
    user: customers
    name: customers
    # password from customer-db's secret
    passwordSecretRef:
      name: customer-db-postgresql
      namespace: platform
      key: password
  bundle:
    pvcName: prompt-bundle
    pvcNamespace: platform
    mountPath: /var/lib/prompts
  oidc:
    issuer: http://dex.platform.svc.cluster.local:5556/dex
    audience: demo-ui
  networkPolicy:
    allowedNamespaces:
      - gateway
  serviceMonitor:
    enabled: true
    namespace: mcp
  resources:
    requests: { cpu: "100m", memory: "256Mi" }
    limits:   { cpu: "1",    memory: "512Mi" }

kube-prometheus-stack:
  enabled: true
  fullnameOverride: kps
  namespaceOverride: platform
  prometheus:
    prometheusSpec:
      retention: 7d
      retentionSize: 5GiB
      # Pick up ServiceMonitors from ANY namespace (subcharts label theirs).
      serviceMonitorSelectorNilUsesHelmValues: false
      podMonitorSelectorNilUsesHelmValues: false
      ruleSelectorNilUsesHelmValues: false
    service:
      type: ClusterIP
  grafana:
    enabled: true
    adminPassword: "prom-operator"
    service:
      type: NodePort
      nodePort: 30090
    sidecar:
      dashboards:
        enabled: true
        label: grafana_dashboard
        labelValue: "1"
        searchNamespace: ALL
      datasources:
        enabled: true
    grafana.ini:
      auth.anonymous:
        enabled: true
        org_role: Viewer
    persistence:
      enabled: true
      size: 1Gi
  alertmanager:
    enabled: true
    alertmanagerSpec:
      replicas: 1

local-llm:
  enabled: true
  namespace: platform
  model: "llama3.2:3b"

demo-ui:
  enabled: true
  namespace: platform

