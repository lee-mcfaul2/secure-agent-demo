# linkerd-values.yaml — values for the STANDALONE linkerd-control-plane
# release, installed by scripts/bootstrap.sh into its own `linkerd`
# namespace (NOT a subchart of the ai-security umbrella). A namespace
# cannot both host the Linkerd control plane and auto-inject workloads,
# so Linkerd is its own release; platform/gateway/mcp/sandbox are meshed
# by its webhook.
# ============================================================================
