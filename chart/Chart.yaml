apiVersion: v2
name: ai-security-demo
description: Umbrella chart for the AI Agent Security Platform demo
type: application
version: 0.1.0
appVersion: "0.1.0"
kubeVersion: ">=1.28.0"
maintainers:
  - name: lee-mcfaul2
dependencies:
  # NOTE: the Linkerd + SPIRE CRDs are NOT subchart deps — they are shipped as
  # static manifests in this chart's crds/ directory (extracted from
  # linkerd-crds 1.6.1 and spire-crds 0.4.0). Helm installs everything in
  # crds/ BEFORE rendering/validating templates, so a single `helm install`
  # works: the CRDs exist before the platform subcharts' custom resources
  # (AuthorizationPolicy, Server, ClusterSPIFFEID, …) are validated. No
  # out-of-band kubectl step, no Makefile required.
  - name: linkerd-control-plane
    version: "1.16.11"
    repository: https://helm.linkerd.io/stable
    condition: linkerd-control-plane.enabled
  - name: spire
    version: "0.21.x"
    repository: https://spiffe.github.io/helm-charts-hardened/
    condition: spire.enabled
  - name: kube-prometheus-stack
    version: "65.x"
    repository: https://prometheus-community.github.io/helm-charts
    condition: kube-prometheus-stack.enabled
  - name: dex
    version: "0.19.x"
    repository: https://charts.dexidp.io
    condition: dex.enabled
  - name: postgresql
    version: "16.x"
    repository: https://charts.bitnami.com/bitnami
    alias: customer-db
    condition: customer-db.enabled
  - name: pii-tokenizer
    version: "0.1.0"
    repository: oci://ghcr.io/lee-mcfaul2/charts
    condition: pii-tokenizer.enabled
  - name: llm-guard
    version: "0.1.0"
    repository: oci://ghcr.io/lee-mcfaul2/charts
    condition: llm-guard.enabled
  - name: agent-gateway
    version: "0.1.0"
    repository: oci://ghcr.io/lee-mcfaul2/charts
    condition: agent-gateway.enabled
  - name: agent-sandbox
    version: "0.1.0"
    repository: oci://ghcr.io/lee-mcfaul2/charts
    condition: agent-sandbox.enabled
  # Local patched override: the published agent-sql-mcp 0.1.0 ships a
  # pre-install migration hook that needs a DB + secret Helm only creates as
  # normal manifests, and is missing the DSN secret + migrations ConfigMap
  # entirely. The fixed copy lives in charts-local/ until it is re-released.
  - name: agent-sql-mcp
    version: "0.1.0"
    repository: "file://./charts-local/agent-sql-mcp"
    condition: agent-sql-mcp.enabled
  - name: local-llm
    version: "0.1.0"
    repository: "file://./charts-local/local-llm"
    condition: local-llm.enabled
  - name: demo-ui
    version: "0.1.0"
    repository: "file://./charts-local/demo-ui"
    condition: demo-ui.enabled
  - name: traffic-gen
    version: "0.1.0"
    repository: "file://./charts-local/traffic-gen"
    condition: traffic-gen.enabled
