apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-ui
  namespace: {{ .Values.namespace }}
spec:
  replicas: 1
  selector: { matchLabels: { app: demo-ui } }
  template:
    metadata:
      labels: { app: demo-ui }
    spec:
      containers:
        - name: nginx
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports: [ { name: http, containerPort: 80 } ]
          volumeMounts:
            - { name: static, mountPath: /usr/share/nginx/html }
      volumes:
        - name: static
          configMap:
            name: demo-ui-static
            items:
              - { key: index.html, path: index.html }
