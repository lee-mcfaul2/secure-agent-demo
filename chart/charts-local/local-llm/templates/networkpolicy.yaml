apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: local-llm-allow-gateway
  namespace: {{ .Values.namespace }}
spec:
  podSelector:
    matchLabels: { app: local-llm }
  policyTypes: ["Ingress"]
  ingress:
    - from:
        {{- range .Values.networkPolicy.allowedNamespaces }}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ . | quote }}
        {{- end }}
      ports:
        - protocol: TCP
          port: 11434
