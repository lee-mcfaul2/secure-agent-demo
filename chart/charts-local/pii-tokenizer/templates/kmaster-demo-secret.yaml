{{- if .Values.kmaster.demoKey }}
# ☢️ DEMO-ONLY committed AEAD master key — turnkey demo only, never real data.
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.kmaster.aeadLocal.secretName }}
  namespace: {{ .Values.namespace }}
type: Opaque
# `data` (not stringData): demoKey is base64 of the raw 32-byte AEAD key, so
# k8s decodes it and the mounted k_master_v1 file is exactly 32 bytes — what
# internal/kmaster/aead_local.go requires (stringData wrote the 44-char base64
# literal -> "expected 32 bytes, got 44").
data:
  k_master_v1: {{ .Values.kmaster.demoKey | quote }}
{{- end }}
