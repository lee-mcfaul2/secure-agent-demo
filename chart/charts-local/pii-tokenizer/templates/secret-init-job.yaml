{{- if and (eq .Values.kmaster.backend "aead-local") .Values.initKMaster (not .Values.kmaster.demoKey) }}
apiVersion: batch/v1
kind: Job
metadata:
  name: pii-tokenizer-init-kmaster
  namespace: {{ .Values.namespace }}
  annotations:
    helm.sh/hook: post-install
    helm.sh/hook-delete-policy: hook-succeeded
spec:
  template:
    spec:
      restartPolicy: Never
      serviceAccountName: pii-tokenizer-sa
      containers:
        - name: init
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              if [ -f /workdir/k_master_v1 ]; then exit 0; fi
              rotate-kmaster init -o /workdir
              echo "Apply the Secret manually OR use a sidecar that writes via kubectl."
          volumeMounts:
            - { name: work, mountPath: /workdir }
      volumes:
        - name: work
          emptyDir: {}
{{- end }}
