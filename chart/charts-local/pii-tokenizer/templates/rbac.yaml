{{- if eq .Values.kmaster.backend "aead-local" }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pii-tokenizer-secret-reader
  namespace: {{ .Values.namespace }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["{{ .Values.kmaster.aeadLocal.secretName }}"]
    verbs: ["get", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pii-tokenizer-secret-reader
  namespace: {{ .Values.namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: pii-tokenizer-secret-reader
subjects:
  - kind: ServiceAccount
    name: pii-tokenizer-sa
    namespace: {{ .Values.namespace }}
{{- end }}
