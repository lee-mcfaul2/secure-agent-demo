image:
  repository: ghcr.io/lee-mcfaul2/agent-sql-mcp
  tag: 0.1.1   # v0.1.1: OIDC discovery JWKS fix (was 0.1.0)
  pullPolicy: IfNotPresent

replicas: 2

resources:
  requests: { cpu: 100m, memory: 128Mi }
  limits:   { cpu: 500m, memory: 512Mi }

namespace: mcp

oidc:
  issuer: ""
  audience: agent-sql-mcp

gatewaySPIFFE: "spiffe://ai-security.io/ns/gateway/sa/agent-gateway-sa"

database:
  # The chart assembles the DSN Secret below from these parts, so the umbrella
  # only passes plain connection values — no pre-existing secret required.
  secretName: agent-sql-mcp-db
  secretKey: dsn
  host: ""
  port: 5432
  user: ""
  name: ""
  # ☢️ DEMO-ONLY plaintext DB password. Same loudly-flagged demo trade-off as
  # the platform's other baked secrets — never do this for real data.
  password: ""
  sslmode: disable
  poolMax: 25
  queryTimeoutSeconds: 5

schemaVersion: "v1"

service:
  port: 8443

audit:
  retentionDays: 90

migrations:
  image: migrate/migrate:v4.18.1
  # Tiny image for an initContainer that blocks until Postgres accepts TCP.
  waitImage: busybox:1.36
