# ============================================================================
# ☢️  DEMO-ONLY DB SECRET — the DSN (incl. password) is assembled here in
# plaintext from chart values so the umbrella stays turnkey. Same deliberate,
# loudly-flagged demo trade-off as the rest of the platform's baked secrets.
# In production the DSN comes from a real secret store, never templated values.
# ============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.database.secretName }}
  namespace: {{ .Values.namespace }}
type: Opaque
stringData:
  {{ .Values.database.secretKey }}: >-
    postgres://{{ .Values.database.user }}:{{ .Values.database.password }}@{{ .Values.database.host }}:{{ .Values.database.port }}/{{ .Values.database.name }}?sslmode={{ .Values.database.sslmode }}
