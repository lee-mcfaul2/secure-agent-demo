apiVersion: batch/v1
kind: Job
metadata:
  name: agent-sql-mcp-migrate
  namespace: {{ .Values.namespace }}
  annotations:
    # post-install (NOT pre-install): the migration needs the Postgres DB and
    # the DSN secret, both of which Helm only creates as normal manifests. A
    # pre-install hook runs before those exist and can never connect. With
    # --wait, Helm waits for normal resources (incl. the DB) to be Ready before
    # running post-install hooks, so by here Postgres is up.
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "0"
    # hook-failed too: without it a FAILED migrate Job is never cleaned
    # (helm uninstall does not remove hook resources) and lingers as a
    # cross-run "ghost" that pollutes diagnostics.
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded,hook-failed
spec:
  backoffLimit: 2
  template:
    metadata:
      annotations:
        linkerd.io/inject: disabled
    spec:
      restartPolicy: Never
      initContainers:
        # Belt-and-suspenders: block until Postgres actually accepts TCP, so a
        # slow-starting DB surfaces as a bounded wait, not a migrate crash-loop.
        - name: wait-for-postgres
          image: "{{ .Values.migrations.waitImage }}"
          command: ["/bin/sh", "-c"]
          args:
            - |
              until nc -z "{{ .Values.database.host }}" {{ .Values.database.port }}; do
                echo "waiting for postgres at {{ .Values.database.host }}:{{ .Values.database.port }} ..."
                sleep 2
              done
              echo "postgres is reachable"
      containers:
        - name: migrate
          image: "{{ .Values.migrations.image }}"
          command: ["migrate"]
          args:
            - "-path=/migrations"
            - "-database=$(SQLMCP_DATABASE_URL)"
            - "up"
          env:
            - name: SQLMCP_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.secretName }}
                  key:  {{ .Values.database.secretKey }}
          volumeMounts:
            - name: migrations
              mountPath: /migrations
      volumes:
        - name: migrations
          configMap: { name: agent-sql-mcp-migrations }
