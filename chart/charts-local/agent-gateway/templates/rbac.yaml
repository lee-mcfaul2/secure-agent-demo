apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: agent-gateway-job-launcher
  namespace: {{ .Values.sandboxNamespace }}
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: agent-gateway-job-launcher
  namespace: {{ .Values.sandboxNamespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: agent-gateway-job-launcher
subjects:
  - kind: ServiceAccount
    name: agent-gateway-sa
    namespace: {{ .Values.namespace }}
