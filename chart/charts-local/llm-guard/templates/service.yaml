apiVersion: v1
kind: Service
metadata:
  name: llm-guard
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "llm-guard.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: llm-guard
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
