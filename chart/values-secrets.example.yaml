# Copy this file to values-secrets.yaml (gitignored) and fill in.
# Used by `helm install ... -f chart/values-secrets.yaml`.

pii-tokenizer:
  # k_master: AES master key for the tokenizer. Generate with:
  #   openssl rand -base64 32
  k_master: "REPLACE_ME_BASE64_32_BYTES"

agent-gateway:
  litellm:
    # Optional: set to point at real Anthropic instead of local Ollama.
    # api_key: "sk-ant-..."
    api_key: ""

# Optional Slack webhook for Alertmanager (leave blank for stdout-only).
kube-prometheus-stack:
  alertmanager:
    config:
      receivers:
        - name: 'slack'
          slack_configs: []   # add { api_url: "https://hooks.slack.com/..." }
