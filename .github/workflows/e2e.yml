name: e2e

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Set up KIND
        uses: helm/kind-action@v1
        with:
          cluster_name: ai-security
          config: kind/demo-cluster.yaml

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with: { python-version: "3.11" }

      - name: Install Python deps
        run: |
          pip install -r traffic_gen/requirements.txt
          pip install -r tests/agentdojo/requirements.txt

      - name: Unit tests
        run: |
          PYTHONPATH=. python -m pytest traffic_gen/tests/ tests/agentdojo/tests/ -v

      - name: Helm render test
        run: bash tests/helm/test_chart_renders.sh

      - name: Prepare CI values
        run: |
          mkdir -p chart/dashboards
          cp dashboards/*.json chart/dashboards/
          cp traffic_gen/traffic_gen.py chart/charts-local/traffic-gen/traffic_gen.py
          cat <<EOF > chart/values-secrets.yaml
          pii-tokenizer:
            k_master: "$(openssl rand -base64 32)"
          EOF

      - name: helm dependency update
        run: cd chart && helm dependency update

      - name: helm install
        run: |
          helm upgrade --install ai-security ./chart \
            -n platform --create-namespace \
            -f chart/values-demo.yaml \
            -f chart/values-ci.yaml \
            -f chart/values-secrets.yaml \
            --timeout 15m --wait

      - name: Wait for pods
        run: bash scripts/wait-for-ready.sh

      - name: Port-forward gateway + Dex
        run: |
          kubectl -n gateway port-forward svc/agent-gateway 8080:8080 &
          kubectl -n platform port-forward svc/dex 5556:5556 &
          sleep 5

      - name: Smoke test
        run: bash scripts/smoke.sh

      - name: AgentDojo gate
        run: |
          cd tests/agentdojo
          python run_agentdojo.py --config config.yaml --out agentdojo-results.json
          python score_gate.py agentdojo-results.json config.yaml

      - name: PR comment with AgentDojo summary
        if: github.event_name == 'pull_request' && always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f tests/agentdojo/agentdojo-results.json ]; then
            python -c "
            import json
            r = json.load(open('tests/agentdojo/agentdojo-results.json'))
            s = r['scenarios']
            blocked = sum(1 for x in s if x.get('attack_blocked'))
            total = len(s)
            rate = blocked/total if total else 0
            print(f'## AgentDojo results\n\n- Block rate: **{rate:.1%}** ({blocked}/{total})')
            " > /tmp/comment.md
            gh pr comment ${{ github.event.pull_request.number }} --body-file /tmp/comment.md
          fi
