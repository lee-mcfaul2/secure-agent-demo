name: chart-ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  chart:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: helm dependency build
        run: cd chart && helm dependency build

      - name: helm lint
        run: helm lint chart/ -f chart/values-demo.yaml

      - name: helm template (renders cleanly with all subcharts)
        run: |
          helm template ai-security chart/ -f chart/values-demo.yaml \
            --namespace platform > /tmp/render.yaml
          test -s /tmp/render.yaml
          echo "rendered $(grep -c '^kind:' /tmp/render.yaml) objects"

      - name: CRDs ship in chart/crds/
        run: |
          test -s chart/crds/linkerd-crds.yaml
          test -s chart/crds/spire-crds.yaml
          grep -q 'servers.policy.linkerd.io' chart/crds/linkerd-crds.yaml
          grep -q 'clusterspiffeids.spire.spiffe.io' chart/crds/spire-crds.yaml

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Install deps
        run: |
          pip install -r traffic_gen/requirements.txt
          pip install -r tests/agentdojo/requirements.txt
      - name: Unit tests
        run: PYTHONPATH=. python -m pytest traffic_gen/tests/ tests/agentdojo/tests/ -v
