name: nightly-agentdojo

on:
  schedule:
    - cron: "0 3 * * *"     # 3am UTC daily
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  nightly:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Set up KIND
        uses: helm/kind-action@v1
        with:
          cluster_name: ai-security
          config: kind/demo-cluster.yaml

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with: { python-version: "3.11" }

      - name: Install deps + bring up
        run: |
          pip install -r traffic_gen/requirements.txt -r tests/agentdojo/requirements.txt
          mkdir -p chart/dashboards
          cp dashboards/*.json chart/dashboards/
          cp traffic_gen/traffic_gen.py chart/charts-local/traffic-gen/traffic_gen.py
          cat <<EOF > chart/values-secrets.yaml
          pii-tokenizer:
            k_master: "$(openssl rand -base64 32)"
          EOF
          cd chart && helm dependency update && cd ..
          helm upgrade --install ai-security ./chart \
            -n platform --create-namespace \
            -f chart/values-demo.yaml -f chart/values-secrets.yaml \
            --timeout 15m --wait
          bash scripts/wait-for-ready.sh
          kubectl -n gateway port-forward svc/agent-gateway 8080:8080 &
          kubectl -n platform port-forward svc/dex 5556:5556 &
          sleep 5

      - name: Full AgentDojo (no suite cap)
        run: |
          # Override the config to run all suites at full size for nightly
          python tests/agentdojo/run_agentdojo.py --config tests/agentdojo/config.yaml \
            --out tests/agentdojo/agentdojo-results.json

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: agentdojo-results
          path: tests/agentdojo/agentdojo-results.json
